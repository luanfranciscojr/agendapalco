services:
  mysql:
    image: mysql:8.4
    container_name: agendamento-palco-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: agendamento_palco
      MYSQL_USER: agendamento
      MYSQL_PASSWORD: agendamento123
      TZ: America/Manaus
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  mysql_data:
