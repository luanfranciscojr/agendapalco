name: Deploy Agendamento do Palco

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agendamento-palco
  CONTAINER_NAME: agendamento-palco
  APP_PORT: 3001
  HOST_PORT: 3031

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  update-server:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMSBARATO_API_KEY: ${{ secrets.SMSBARATO_API_KEY }}
          SMSBARATO_BASE_URL: ${{ secrets.SMSBARATO_BASE_URL }}
          SMSBARATO_TEMPLATE_APPROVED: ${{ secrets.SMSBARATO_TEMPLATE_APPROVED }}
          SMSBARATO_TEMPLATE_REJECTED: ${{ secrets.SMSBARATO_TEMPLATE_REJECTED }}
          SMSBARATO_TEMPLATE_PENDING_ADMIN: ${{ secrets.SMSBARATO_TEMPLATE_PENDING_ADMIN }}
        run: |
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" <<EOF
            set -e
            sudo docker login ${REGISTRY} -u ${GHCR_USERNAME} -p ${GHCR_TOKEN}
            sudo docker pull ${IMAGE_NAME}:latest
            sudo docker stop ${CONTAINER_NAME} || true
            sudo docker rm ${CONTAINER_NAME} || true
            sudo docker run -d \
              --name ${CONTAINER_NAME} \
              --restart unless-stopped \
              --add-host=host.docker.internal:host-gateway \
              -p ${HOST_PORT}:${APP_PORT} \
              -e PORT=${APP_PORT} \
              -e DATABASE_URL="${DATABASE_URL}" \
              -e SMSBARATO_API_KEY="${SMSBARATO_API_KEY}" \
              -e SMSBARATO_BASE_URL="${SMSBARATO_BASE_URL}" \
              -e SMSBARATO_TEMPLATE_APPROVED="${SMSBARATO_TEMPLATE_APPROVED}" \
              -e SMSBARATO_TEMPLATE_REJECTED="${SMSBARATO_TEMPLATE_REJECTED}" \
              -e SMSBARATO_TEMPLATE_PENDING_ADMIN="${SMSBARATO_TEMPLATE_PENDING_ADMIN}" \
              ${IMAGE_NAME}:latest
          EOF
